<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 Марта, любимая!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #fbc2c2 0%, #f8e0e6 50%, #c7e9fb 100%);
            font-family: 'Segoe UI', 'Arial', sans-serif;
            padding: 15px;
        }

        .card {
            max-width: 550px;
            width: 100%;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(5px);
            border-radius: 50px 50px 40px 40px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.2), 0 0 0 2px rgba(255, 255, 255, 0.7) inset;
            padding: 35px 25px 45px 25px;
            text-align: center;
            position: relative;
            overflow: hidden;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        /* Падающие цветы (мелкие) */
        .flower-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .flower {
            position: absolute;
            color: rgba(255, 240, 245, 0.7);
            font-size: 1.4rem;
            animation: fall linear infinite;
            user-select: none;
            text-shadow: 0 0 5px #ff99aa;
        }

        @keyframes fall {
            from { transform: translateY(-10vh) rotate(0deg); opacity: 0.8; }
            to { transform: translateY(110vh) rotate(360deg); opacity: 0.2; }
        }

        /* Контент открытки (поверх фона) */
        .content {
            position: relative;
            z-index: 10;
        }

        .title {
            font-size: 2.7rem;
            font-weight: 800;
            color: #b3404a;
            text-shadow: 3px 3px 0 #ffeef2, 5px 5px 0 rgba(255, 200, 210, 0.5);
            margin-bottom: 5px;
            letter-spacing: 2px;
            animation: glitch 2s infinite;
        }
        @keyframes glitch {
            0%, 100% { transform: skew(0deg, 0deg); opacity: 1; }
            95% { transform: skew(2deg, 1deg); opacity: 0.9; }
            96% { transform: skew(-2deg, -1deg); opacity: 1; }
        }

        .subtitle {
            font-size: 1.5rem;
            color: #6d3b47;
            font-weight: 500;
            background: rgba(255, 215, 220, 0.5);
            display: inline-block;
            padding: 5px 25px;
            border-radius: 50px;
            backdrop-filter: blur(2px);
            margin-bottom: 20px;
            border: 1px solid #ffb6c1;
        }

        .heart-container {
            font-size: 4rem;
            line-height: 1;
            margin: 15px 0 10px;
            animation: heartbeat 1.2s infinite ease-in-out;
            filter: drop-shadow(0 0 15px #ff4d6d);
        }
        @keyframes heartbeat {
            0% { transform: scale(1); }
            25% { transform: scale(1.2); }
            35% { transform: scale(1.1); }
            45% { transform: scale(1.3); }
            55% { transform: scale(1); }
        }

        .message {
            font-size: 1.3rem;
            color: #2e1a20;
            background: rgba(255, 255, 255, 0.7);
            padding: 25px 20px;
            border-radius: 60px 20px 60px 20px;
            margin: 20px 0 25px;
            font-weight: 500;
            line-height: 1.5;
            box-shadow: 0 10px 20px rgba(150, 50, 70, 0.2);
            border: 2px dashed #ffa5b9;
            transition: 0.3s;
        }
        .message span {
            display: block;
            font-size: 1rem;
            margin-top: 10px;
            color: #a6576a;
            font-style: italic;
        }

        .flowers-big {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 15px 0 20px;
        }

        .flower-big {
            font-size: 3rem;
            display: inline-block;
            animation: sway 3s infinite alternate;
            filter: drop-shadow(2px 4px 8px #d48c9c);
        }
        .flower-big:nth-child(2) { animation-delay: 0.5s; }
        .flower-big:nth-child(3) { animation-delay: 1s; }
        @keyframes sway {
            from { transform: rotate(-8deg); }
            to { transform: rotate(8deg); }
        }

        .signature {
            font-size: 1.7rem;
            font-weight: bold;
            color: #ac3f54;
            margin-top: 15px;
            border-top: 2px solid white;
            padding-top: 15px;
            display: inline-block;
        }
        .signature small {
            font-size: 1rem;
            color: #72414b;
        }

        /* Кнопка для сюрприза */
        .surprise-btn {
            background: #ff8a9f;
            border: none;
            color: white;
            font-size: 1.1rem;
            padding: 12px 25px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            box-shadow: 0 5px 0 #b44b5e, 0 8px 18px rgba(255, 100, 150, 0.5);
            transition: all 0.1s ease;
            border: 1px solid #ffc0cb;
        }
        .surprise-btn:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #b44b5e, 0 8px 18px rgba(255, 100, 150, 0.5);
        }

        .surprise-message {
            margin-top: 20px;
            font-size: 1.5rem;
            color: #b82c4a;
            font-weight: bold;
            min-height: 3rem;
            opacity: 0;
            transition: opacity 0.5s;
            text-shadow: 0 0 5px white;
        }
        .surprise-message.show {
            opacity: 1;
        }

    </style>
</head>
<body>

<div class="card">
    <!-- Анимированный фон из цветов -->
    <div class="flower-bg" id="flowerBg"></div>

    <div class="content">
        <div class="title">С 8 МАРТА!</div>
        <div class="subtitle">Моя любимая Лидия</div>

        <div class="heart-container">❤️</div>

        <div class="message">
            🌷 Ты — самое прекрасное, что случилось в моей жизни. <br>
            Пусть этой весной расцветают не только цветы, но и твоя улыбка. <br>
            С праздником, моя радость! 💐
            <span>Твой самый счастливый человек</span>
        </div>

        <div class="flowers-big">
            <div class="flower-big">🌸</div>
            <div class="flower-big">🌺</div>
            <div class="flower-big">🌼</div>
        </div>

        <div class="signature">
            Твой <3 <br><small>навсегда</small>
        </div>

        <!-- Кнопка для дополнительного сюрприза -->
        <button class="surprise-btn" id="surpriseBtn">Нажми меня ❤️</button>
        <div class="surprise-message" id="surpriseMsg"></div>
    </div>
</div>

<script>
    // Функция для создания падающих цветов
    function createFallingFlowers() {
        const bg = document.getElementById('flowerBg');
        const flowerSymbols = ['🌸', '🌹', '🌷', '🌼', '🌺', '🌸', '🌿', '✨', '💮'];
        const count = 35; // Количество цветов

        for (let i = 0; i < count; i++) {
            const flower = document.createElement('div');
            flower.classList.add('flower');
            flower.innerHTML = flowerSymbols[Math.floor(Math.random() * flowerSymbols.length)];
            
            // Случайные стили для каждого цветка
            const size = Math.random() * 1.5 + 0.8; // от 0.8 до 2.3rem
            flower.style.fontSize = size + 'rem';
            flower.style.left = Math.random() * 100 + '%';
            flower.style.animationDuration = Math.random() * 10 + 8 + 's'; // от 8 до 18с
            flower.style.animationDelay = Math.random() * -10 + 's'; // чтобы не все сразу падали
            flower.style.opacity = Math.random() * 0.5 + 0.3;
            
            bg.appendChild(flower);
        }
    }

    // Сюрприз при нажатии на кнопку
    function setupSurprise() {
        const btn = document.getElementById('surpriseBtn');
        const msgDiv = document.getElementById('surpriseMsg');
        const messages = [
            "🌷 Ты — мой самый любимый цветочек!",
            "❤️ Я тебя очень сильно люблю!",
            "😘 С тобой каждый день как 8 марта!",
            "💐 Обнимаю тебя мысленно!",
            "✨ Ты делаешь этот мир лучше.",
            "🎁 Сюрприз! Ты самая лучшая!"
        ];

        btn.addEventListener('click', () => {
            const randomMsg = messages[Math.floor(Math.random() * messages.length)];
            msgDiv.textContent = randomMsg;
            msgDiv.classList.add('show');
            
            // Дополнительная вспышка сердечек (визуально)
            btn.style.transform = 'scale(0.95)';
            setTimeout(() => btn.style.transform = '', 150);
            
            // Создать временное сердечко в месте клика (эффект)
            const heart = document.createElement('span');
            heart.innerHTML = '💖';
            heart.style.position = 'absolute';
            heart.style.left = '50%';
            heart.style.top = '50%';
            heart.style.fontSize = '3rem';
            heart.style.transform = 'translate(-50%, -50%)';
            heart.style.pointerEvents = 'none';
            heart.style.animation = 'heartbeat 1s forwards';
            heart.style.zIndex = '20';
            btn.style.position = 'relative';
            btn.appendChild(heart);
            
            setTimeout(() => {
                if (heart.parentNode === btn) {
                    btn.removeChild(heart);
                }
            }, 1000);
        });
    }

    // Запускаем всё после загрузки страницы
    window.onload = () => {
        createFallingFlowers();
        setupSurprise();

        // Добавим еще один сюрприз: меняем фразу при наведении на сердце
        const heartContainer = document.querySelector('.heart-container');
        const msgDiv = document.getElementById('surpriseMsg');
        heartContainer.addEventListener('mouseenter', () => {
            msgDiv.textContent = '😍 Моя любовь к тебе бьется сильнее!';
            msgDiv.classList.add('show');
        });
    };
</script>

<!-- Дополнительный стиль для встроенной анимации кнопки -->
<style>
    .surprise-btn { position: relative; overflow: hidden; }
    .surprise-btn span { position: absolute; animation: heartbeat 0.8s ease; }
</style>

</body>
</html>
